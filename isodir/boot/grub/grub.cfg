set timeout=3
set default=0

menuentry "Minux L4 Microkernel" {
    echo "Loading Minux..."
    multiboot2 /boot/kernel.bin
    echo "Loading bootstrap modules..."
    module2 /boot/modules/elf_loader elf_loader
    module2 /boot/modules/init init
    module2 /boot/modules/bootfs bootfs
    echo "Booting..."
    boot
}
